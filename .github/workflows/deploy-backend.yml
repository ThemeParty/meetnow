name: Deploy Backend to Server

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Spring Boot Profile"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev
          - local

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.MEETNOW_DOCKER_HUB_ID }}
          password: ${{ secrets.MEETNOW_DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker Image
        run: |
          cd back
          chmod +x docker-build.sh
          ./docker-build.sh ${{ vars.MEETNOW_DOCKER_HUB_ID }}/meetnow-backend ${{ github.sha }}
          ./docker-build.sh ${{ vars.MEETNOW_DOCKER_HUB_ID }}/meetnow-backend latest

      - name: Push Docker Image
        run: |
          cd back
          docker push ${{ vars.MEETNOW_DOCKER_HUB_ID }}/meetnow-backend:${{ github.sha }}
          docker push ${{ vars.MEETNOW_DOCKER_HUB_ID }}/meetnow-backend:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.4
        with:
          host: meetnow.kr
          port: 25522
          username: ${{ secrets.WONHYEONG_MAC_MINI_USERNAME }}
          key: ${{ secrets.WONHYEONG_MAC_MINI_SSH_KEY }}
          script: |
            cd ${{ secrets.WONHYEONG_MAC_MINI_MEETNOW_HOME }}

            # Pull latest image
            /usr/local/bin/docker pull ${{ vars.MEETNOW_DOCKER_HUB_ID }}/meetnow-backend:latest

            # Stop and remove existing container
            /usr/local/bin/docker stop meetnow-backend || true
            /usr/local/bin/docker rm meetnow-backend || true

            # Run new container with profile
            /usr/local/bin/docker run -d \
              --name meetnow-backend \
              -p 8891:8891 \
              --restart always \
              --network meetnow_app-network \
              -e MONGO_DB_USERNAME=${{ secrets.MEETNOW_MONGO_DB_USERNAME }} \
              -e MONGO_DB_PASSWORD=${{ secrets.MEETNOW_MONGO_DB_PASSWORD }} \
              -e SPRING_PROFILES_ACTIVE=${{ github.event.inputs.profile }} \
              ${{ vars.MEETNOW_DOCKER_HUB_ID }}/meetnow-backend:latest

            # Clean up unused images
            /usr/local/bin/docker system prune -af

            # Health check
            echo "Waiting for application to start..."
            sleep 30

            # Check if application is running
            if curl -f http://localhost:8891/actuator/health; then
              echo "✅ Backend deployment successful!"
              echo "🌐 Application URL: http://meetnow.kr:8891"
              echo "🔧 Active Profile: ${{ github.event.inputs.profile }}"
            else
              echo "❌ Backend deployment failed!"
              exit 1
            fi
